name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: actions-rust-lang/setup-rust-toolchain@v1.15.4
      - uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.15.1
      - name: Extract changelog for current version
        run: |
          VERSION="${REF_NAME#v}"
          # this oneliner does the following:
          # - select the section of the changelog for the current version
          # - remove the last line (which is the next version header)
          # - replace "##" with "#" to adjust markdown levels
          # - remove extra blank lines
          sed -n "/^## \[${VERSION}\]/,/^## \[/p" CHANGELOG.md | sed '$d' | sed 's/^##/#/' | cat -s > /tmp/release-notes.md
        env:
          REF_NAME: ${{ github.ref_name }}
      - uses: goreleaser/goreleaser-action@v7.0.0
        with:
          args: release --clean --release-notes /tmp/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
